# Deployed to GitHub Pages under /texas-bible-bowl/ until the domain migration (Phase 6);
# canonifyURLs (below) keeps root-relative links working on the subpath.
baseURL = "https://markgitset.github.io/texas-bible-bowl/"
locale = "en-us"
title = "Texas Bible Bowl"
# Rewrite root-relative URLs written in content (e.g. /images/..., /uploads/...) with the
# build's baseURL so they keep the path prefix on the GitHub Pages subpath deployment.
canonifyURLs = true

# Emit a JSON search index (/index.json) alongside the home page, consumed by the
# client-side search on /search/. Template: layouts/index.json.
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  description   = "Making God's Word Important — Annual Bible knowledge competition for students 3rd grade through adult."
  tagline       = "Making God's Word Important"
  eventYear     = "2027"
  eventDateRange = "April 2–4"   # year comes from eventYear; compose in templates
  eventTheme    = "TBD"
  eventScripture = "Acts"
  scholarshipAmount = "$25,000"   # total awarded in the prior year (eventYear - 1)
  registrationOpensOn = ""   # ISO date "2027-02-01"; "" = not announced (renders TBD)
  registrationClosesOn = ""  # ISO date, last day to register; "" = TBD
  scholarshipDeadline = "TBD"       # Month day; year derived from eventYear
  # Fees in integer cents; omit/-1 for TBD. Display strings are derived in
  # layouts/partials/season.html and static params.js — keep the three in sync.
  priceContestantCents = -1  # per contestant, t-shirt included
  priceVolunteerCents = -1   # per volunteer/adult attendee, t-shirt included
  priceChildCents = -1       # children ages 3–8, per person
  priceTshirtCents = -1      # extra t-shirts, each
  feesTentative = true       # shows the "subject to change" note next to prices
  tbbScholarshipAmount = "$1,000"
  maryOrbisonAmount = "$1,500"
  paulHendricksonAmount = "TBD"
  facebook      = "https://www.facebook.com/TexasBibleBowl"
  youtube       = "https://www.youtube.com/channel/UCdlu_qTP5cmoQrNGJSDRbcg"
  mailingAddress = "10431 Remuda View Drive, San Antonio, TX 78254"
  # Social/link-preview share image, in static/images/ (1.91:1, e.g. 1100x576). When
  # swapping the photo, give the new file a NEW name (e.g. share-2027.jpg) — scrapers
  # cache previews per URL, so reusing a filename keeps stale images alive for weeks.
  shareImage    = "share-2026.jpg"
  # Backend base URL baked into the app shell (window.TBB_BACKEND_URL). Empty locally so the
  # app falls back to localhost; CI overrides via HUGO_PARAMS_BACKENDURL (pages.yml).
  backendURL    = ""

# Homepage hero slideshow. Image files live in static/images/hero/ (cropped to the
# 2.26:1 banner ratio, e.g. 1100x486). To refresh photos for a new year: drop new
# crops in that folder and update this list — nothing else to edit.
[[params.heroSlides]]
  image = "hero-1.jpg"
  alt   = "A coach studying pages around a table with elementary students during tribe time"

[[params.heroSlides]]
  image = "hero-2.jpg"
  alt   = "A room full of participants laughing and raising their hands during a group activity"

[[params.heroSlides]]
  image = "hero-3.jpg"
  alt   = "Teen scholarship winners holding certificates in front of the Texas Bible Bowl backdrop"

[[params.heroSlides]]
  image = "hero-4.jpg"
  alt   = "Students in Texas Bible Bowl t-shirts jump and cheer at the awards ceremony"

[[params.heroSlides]]
  image = "hero-5.jpg"
  alt   = "The whole Texas Bible Bowl group gathered on the lawn beneath the camp bell tower"

[[params.heroSlides]]
  image = "hero-6.jpg"
  alt   = "Coaches and students laughing and dancing together between rounds"

[[params.heroSlides]]
  image = "hero-7.jpg"
  alt   = "Elementary students smiling with their ribbons in front of the Texas Bible Bowl backdrop"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true   # allows raw HTML in .md files (needed for maps, forms, embeds)
  [markup.highlight]
    noClasses = false

