{{ define "main" }}
<div class="container py-5">

  {{ partial "breadcrumbs.html" . }}
  <h1 class="page-title mb-4">{{ .Title }}</h1>

  <div id="search-app" data-index="{{ .Site.BaseURL }}index.json">
    <label for="search-input" class="form-label fw-semibold">Search the site</label>
    <input type="search" id="search-input" class="form-control form-control-lg mb-2"
           placeholder="Try “rules”, “scholarship”, “sample questions”…"
           autocomplete="off" autofocus aria-describedby="search-status">
    <p id="search-status" class="text-muted small" role="status" aria-live="polite"></p>
    <div id="search-results" class="mt-3"></div>
    <noscript>
      <p class="text-muted">Search requires JavaScript. Browse the
        <a href="{{ .Site.BaseURL }}sitemap/">site map</a> instead.</p>
    </noscript>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<script src="{{ .Site.BaseURL }}js/search.js"></script>
{{ end }}
