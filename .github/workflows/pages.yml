name: Deploy web to GitHub Pages

# One Pages artifact for both halves (docs/gui-redesign.md §3): the Hugo site at the root and the
# Kotlin/JS app under /app/. Season values are baked into the static build from the live
# backend (GET /seasons/current) when reachable, falling back to the committed site/data/params.json.
# The backend URL is injected from the repository variable BACKEND_URL (Settings → Secrets and
# variables → Actions → Variables), e.g. https://texas-bible-bowl.fly.dev.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow one concurrent Pages deployment; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 25

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.164.0"
          extended: true

      - name: Bake current season params into the static build
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
        run: |
          url="${BACKEND_URL:-https://texas-bible-bowl.fly.dev}"
          if curl -fsS --max-time 30 "$url/seasons/current" -o /tmp/params.json && [ -s /tmp/params.json ]; then
            cp /tmp/params.json site/data/params.json
            echo "Baked live season params from $url"
          else
            echo "::warning::Could not fetch /seasons/current; building with the committed fallback params"
          fi

      - name: Build static site (Hugo)
        env:
          # Baked into the app shell (site/layouts/_default/app-shell.html) as
          # window.TBB_BACKEND_URL — overrides params.backendURL in hugo.toml.
          HUGO_PARAMS_BACKENDURL: ${{ vars.BACKEND_URL || 'https://texas-bible-bowl.fly.dev' }}
        run: hugo -s site --gc --minify -d ../public

      - name: Build web (Kotlin/JS) distribution
        run: ./gradlew :web:jsBrowserDistribution

      - name: Assemble app under /app/
        run: |
          # Hugo already rendered public/app/index.html (the shared-chrome shell from
          # content/app.md); copy the JS dist around it, excluding the dev-only index.html.
          dist=web/build/dist/js/productionExecutable
          test -s public/app/index.html || { echo "::error::Hugo did not render the app shell (public/app/index.html)"; exit 1; }
          rsync -a --exclude=index.html "$dist"/ public/app/
          # Hash routing needs no SPA fallback, but keep one so /app/anything still loads the app.
          cp public/app/index.html public/app/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
