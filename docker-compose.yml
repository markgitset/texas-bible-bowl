services:
  postgres:
    image: postgres:17-alpine
    container_name: tbb-postgres
    environment:
      POSTGRES_DB: biblebowl
      POSTGRES_USER: biblebowl
      POSTGRES_PASSWORD: biblebowl-dev
    ports:
      - "5432:5432"
    volumes:
      - tbb-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U biblebowl"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tbb-pgdata:
